<body class="index-page">

  <main class="main">

    <!-- Login Section for Cyber Attack Prediction -->
    <section id="login" class="login section">

      <!-- Section Title -->
      <div class="container section-title text-center" data-aos="fade-up">
        <h2>Sign In</h2>
        <p>Access your Cyber Attack Prediction dashboard and analytics</p>
      </div><!-- End Section Title -->

      <div class="container" data-aos="fade-up" data-aos-delay="100">
        <div class="row justify-content-center">
          <div class="col-lg-6 col-xl-5">

            <!-- Login Form Card -->
            <div class="login-form-card">

              <!-- Error Message Display -->
              {% if message %}
              <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
              {% endif %}

              <form id="login-form" action="/signin" method="post">
                <div class="row g-4">

                  <div class="col-12">
                    <div class="form-group">
                      <label for="username" class="form-label">
                        <i class="bi bi-person"></i> Username
                      </label>
                      <input type="text" class="form-control" id="username" name="user"
                        placeholder="Enter your username" required>
                    </div>
                  </div>

                  <div class="col-12">
                    <div class="form-group">
                      <label for="password" class="form-label">
                        <i class="bi bi-lock"></i> Password
                      </label>
                      <input type="password" class="form-control" id="password" name="password"
                        placeholder="Enter your password" required>
                    </div>
                  </div>

                  <div class="col-12">
                    <button class="btn-login w-100" type="submit">
                      <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                  </div>

                  <div class="col-12 text-center">
                    <p class="login-footer-text">
                      Don't have an account? <a href="/signup" class="login-link">Sign Up</a>
                    </p>
                  </div>

                </div>
              </form>
            </div><!-- End Login Form Card -->

          </div>
        </div>
      </div>

    </section><!-- /Login Section -->


  </main>



  <!-- Scroll Top -->
  <a href="#" id="scroll-top" class="scroll-top d-flex align-items-center justify-content-center"><i
      class="bi bi-arrow-up-short"></i></a>
